<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80">
  <!-- Red M&M candy -->
  <ellipse cx="32" cy="40" rx="26" ry="30" fill="#CC0000"/>
  <ellipse cx="32" cy="40" rx="22" ry="26" fill="#CC0000"/>
  <!-- Red M&M shine -->
  <ellipse cx="24" cy="28" rx="7" ry="5" fill="#ff4444" opacity="0.5"/>
  <!-- White m on red candy -->
  <text x="32" y="46" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" text-anchor="middle">m</text>
  <!-- Yellow M&M candy -->
  <ellipse cx="82" cy="40" rx="26" ry="30" fill="#F5D223"/>
  <ellipse cx="82" cy="40" rx="22" ry="26" fill="#F5D223"/>
  <!-- Yellow M&M shine -->
  <ellipse cx="74" cy="28" rx="7" ry="5" fill="#fff176" opacity="0.6"/>
  <!-- White m on yellow candy -->
  <text x="82" y="46" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" text-anchor="middle">m</text>
  <!-- M&M's brand text -->
  <text x="120" y="52" font-family="Arial Black, Impact, sans-serif" font-size="30" font-weight="900" fill="#CC0000" letter-spacing="1">M&amp;M's</text>
</svg>
