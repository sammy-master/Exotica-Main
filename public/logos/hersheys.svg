  <rect x="35" y="2" width="6" height="12" rx="2" fill="#C0C0C0"/>
  <path d="M35 6 Q32 4 30 2 M41 6 Q44 4 46 2" stroke="#C0C0C0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- HERSHEY'S text -->
