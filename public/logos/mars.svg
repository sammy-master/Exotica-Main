<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80">
  <!-- Chocolate bar rounded rectangle -->
  <rect x="8" y="14" width="204" height="52" rx="12" fill="#CC0000"/>
  <!-- Subtle inner highlight -->
  <rect x="14" y="20" width="192" height="20" rx="6" fill="#ff2222" opacity="0.3"/>
  <!-- MARS bold italic text -->
  <text x="110" y="52" font-family="Arial Black, Impact, sans-serif" font-size="40" font-style="italic" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">MARS</text>
  <!-- Gold underline accent -->
  <line x1="30" y1="60" x2="190" y2="60" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Gold top accent line -->
  <line x1="30" y1="20" x2="190" y2="20" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
