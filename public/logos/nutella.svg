<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80">
  <!-- White label rectangle with red border -->
  <rect x="6" y="8" width="208" height="64" rx="10" fill="#FFFFFF" stroke="#CC2000" stroke-width="3"/>
  <!-- Red top stripe -->
  <rect x="6" y="8" width="208" height="20" rx="10" fill="#CC2000"/>
  <rect x="6" y="18" width="208" height="10" fill="#CC2000"/>
  <!-- Nutella script text -->
  <text x="110" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" font-weight="bold" fill="#6B2D09" text-anchor="middle" letter-spacing="1">Nutella</text>
  <!-- hazelnut spread subtext -->
  <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#CC2000" text-anchor="middle" letter-spacing="2">hazelnut spread</text>
  <!-- White Nutella text on red stripe -->
  <text x="110" y="23" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">FERRERO</text>
</svg>
