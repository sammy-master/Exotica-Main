<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <!-- Cookie outer ring -->
  <circle cx="40" cy="40" r="35" fill="#003087"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Inner emboss ring -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <!-- Dot pattern emboss around inner ring -->
  <circle cx="40" cy="13" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="55" cy="17" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="65" cy="28" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="68" cy="40" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="65" cy="52" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="55" cy="63" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="40" cy="67" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="25" cy="63" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="15" cy="52" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="12" cy="40" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="15" cy="28" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="25" cy="17" r="2" fill="#FFFFFF" opacity="0.7"/>
  <!-- OREO text inside cookie -->
  <text x="40" y="46" font-family="Arial Black, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">OREO</text>
  <!-- Main brand OREO text to the right -->
  <text x="95" y="52" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="1">OREO</text>
  <!-- Blue underline -->
  <line x1="95" y1="57" x2="232" y2="57" stroke="#003087" stroke-width="3"/>
</svg>
