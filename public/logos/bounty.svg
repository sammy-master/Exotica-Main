<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <!-- Blue rounded rectangle background -->
  <rect x="6" y="8" width="228" height="64" rx="14" fill="#003087"/>
  <!-- Inner subtle highlight -->
  <rect x="10" y="12" width="220" height="20" rx="8" fill="#0044bb" opacity="0.3"/>
  <!-- Coconut half (left side) -->
  <!-- Coconut shell outer half -->
  <path d="M30 56 Q14 56 14 40 Q14 24 30 24 Z" fill="#8B4513"/>
  <!-- Coconut flesh inner -->
  <path d="M30 50 Q20 50 20 40 Q20 30 30 30 Z" fill="#f5deb3"/>
  <!-- Coconut lines (hatching) -->
  <line x1="20" y1="36" x2="30" y2="34" stroke="#8B4513" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="40" x2="30" y2="40" stroke="#8B4513" stroke-width="1" opacity="0.7"/>
  <line x1="20" y1="44" x2="30" y2="46" stroke="#8B4513" stroke-width="1" opacity="0.7"/>
  <!-- BOUNTY text -->
  <text x="140" y="50" font-family="Arial Black, Impact, sans-serif" font-size="30" font-style="italic" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">BOUNTY</text>
  <!-- White underline -->
  <line x1="50" y1="58" x2="228" y2="58" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <!-- Coconut text label -->
  <text x="140" y="70" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" letter-spacing="3" opacity="0.8">A TASTE OF PARADISE</text>
</svg>
